services:
  backend:
    build:
      context: .
      dockerfile: GiftedIQ.Presentation/Dockerfile
    ports:
      - "5294:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development

  frontend:
    build:
      context: ./GiftedIQ.Frontend
      dockerfile: Dockerfile
    ports:
      - "5173:80"
    depends_on:
      - backend
